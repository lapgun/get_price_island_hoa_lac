services:
  # ---- PostgreSQL ----
  db:
    image: postgres:16-alpine
    container_name: hoalac-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hoalac
      POSTGRES_PASSWORD: hoalac
      POSTGRES_DB: hoalac
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hoalac"]
      interval: 5s
      retries: 5

  # ---- FastAPI backend ----
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hoalac-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://hoalac:hoalac@db:5432/hoalac
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # ---- React frontend (nginx) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hoalac-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - api

volumes:
  pgdata:
